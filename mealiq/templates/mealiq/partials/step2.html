<div class="space-y-6 md:space-y-8 animate-in fade-in slide-in-from-right-4 duration-500">
    <div class="text-center">
        <h2 class="text-2xl md:text-3xl font-extrabold text-slate-900 mb-2">{{ pet_name }}의 신체 정보를 알려주세요</h2>
        <p class="text-sm md:text-base text-slate-500 font-medium">정확한 칼로리 계산을 위해 견종과 체중이 필요합니다.</p>
    </div>

    <form hx-post="{% url 'mealiq:next_step' %}" hx-target="#stepper-container" hx-swap="innerHTML" class="space-y-6">
        {% csrf_token %}
        <input type="hidden" name="step" value="2">
        <input type="hidden" name="pet_name" value="{{ pet_name }}">
        <input type="hidden" name="vision_analysis" value="{{ vision_analysis }}">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="space-y-2">
                <label class="text-sm font-bold text-slate-500 ml-4">견종</label>
                <input type="text" name="breed" required placeholder="예: 푸들"
                    class="w-full bg-white border-2 border-slate-100 rounded-3xl px-6 py-4 font-bold text-slate-900 focus:outline-none focus:border-brand-500 transition-all">
            </div>
            <div class="space-y-2">
                <label class="text-sm font-bold text-slate-500 ml-4">체중 (kg)</label>
                <input type="number" step="0.1" name="weight" required placeholder="예: 5.5"
                    class="w-full bg-white border-2 border-slate-100 rounded-3xl px-6 py-4 font-bold text-slate-900 focus:outline-none focus:border-brand-500 transition-all">
            </div>
        </div>

        <button type="submit" class="w-full bg-brand-600 text-white font-bold py-5 rounded-3xl text-lg hover:bg-brand-700 transition-all shadow-xl shadow-brand-100 flex items-center justify-center gap-2 group">
            다음 단계로
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="group-hover:translate-x-1 transition-transform"><path d="m9 18 6-6-6-6"/></svg>
        </button>
    </form>
</div>
