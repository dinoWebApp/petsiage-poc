<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mealiq - AI 맞춤 영양 설계</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTMX CDN -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen text-slate-900 overflow-x-hidden">
    <!-- Navbar -->
    <nav class="fixed top-0 w-full z-50 glass-panel border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 md:px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-brand-600 rounded-lg flex items-center justify-center shadow-lg shadow-brand-200">
                    <span class="text-white font-black text-sm">M</span>
                </div>
                <h1 class="text-lg md:text-xl font-extrabold tracking-tight bg-gradient-to-r from-slate-900 to-slate-500 bg-clip-text text-transparent">Mealiq</h1>
            </div>
            
            <div class="flex items-center gap-3 md:gap-6">
                <div class="hidden sm:flex items-center gap-6 text-sm font-semibold text-slate-500">
                    <a href="#" class="hover:text-brand-600 transition-colors">How it works</a>
                    <a href="#" class="hover:text-brand-600 transition-colors">Pricing</a>
                </div>
                <div class="flex items-center gap-2 md:gap-3">
                    <div class="relative p-2 text-slate-400 hover:text-brand-600 transition-colors cursor-pointer">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.1-5.43H5.42"/></svg>
                        <span id="cart-count" class="absolute top-0 right-0 w-4 h-4 bg-brand-600 text-white text-[10px] font-bold rounded-full flex items-center justify-center">0</span>
                    </div>
                    <button class="bg-slate-900 text-white px-4 md:px-5 py-2 rounded-full text-xs md:text-sm font-bold hover:bg-slate-800 transition-all shadow-lg shadow-slate-200">Sign In</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="pt-24 pb-12 px-4 md:px-6">
        <div id="main-content">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="py-12 border-t border-slate-200 bg-white">
        <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-6">
            <p class="text-slate-400 text-xs font-medium">© 2026 Petsiage Mealiq. All rights reserved.</p>
            <div class="flex gap-8 text-slate-400 text-xs font-bold uppercase tracking-widest">
                <a href="#" class="hover:text-slate-600 transition-colors">Privacy</a>
                <a href="#" class="hover:text-slate-600 transition-colors">Terms</a>
            </div>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
